openapi: 3.1.0
info:
  title: Carpoolink Mentoring Platform API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /api/mentoring/voice/switch:
    post:
      summary: Switch chat session to 1:1 voice mentoring
      responses:
        '200':
          description: Accepted
  /api/mentoring/voice/answer-visibility:
    post:
      summary: Select public or private voice answer visibility
      responses:
        '200':
          description: Updated
  /api/questions:
    post:
      summary: Register paid question
      responses:
        '201':
          description: Created
    get:
      summary: List prioritized questions
      responses:
        '200':
          description: OK
