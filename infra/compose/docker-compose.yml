name: capstone-ap

services:
  postgres:
    image: postgres:16-alpine
    container_name: carpoolink-postgres
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${DB_PORT-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carpoolink-network

networks:
  carpoolink-network:
    driver: bridge

volumes:
  postgres_data:
