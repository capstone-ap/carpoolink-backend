openapi: 3.1.0
info:
  title: Carpoolink Mentoring Platform API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /survey:
    get:
      summary: 사전 설문의 질문과 선택지 조회
      responses:
        '200':
          description: 설문 질문과 선택지 목록 반환
  /survey/results:
    post:
      summary: 사전 설문 결과 제출 및 유형 판정
      responses:
        '200':
          description: 사전 설문 결과 및 유형 저장 및 반환
  /users/exists:
    get:
      summary: 사용자 존재 여부 확인
      responses:
        '200':
          description: 사용자 존재 여부 반환
  /users/me:
    get:
      summary: 사용자 프로필 조회
      responses:
        '200':
          description: 사용자 프로필 정보 반환
  /mentors:
    get:
      summary: 멘토 목록 조회
      responses:
        '200':
          description: 멘토 목록 반환
  /mentors/{mentorId}:
    get:
      summary: 멘토 상세 정보 조회
      responses:
        '200':
          description: 멘토 상세 정보 반환
  /mentorings/group:
    get:
      summary: 일대다 멘토링 목록 조회
      responses:
        '200':
          description: 일대다 멘토링 목록 반환
  /mentorings/one-on-one:
    get:
      summary: 일대일 멘토링 목록 조회
      responses:
        '200':
          description: 일대일 멘토링 목록 반환
  /scripts:
    get:
      summary: 접근 가능한(멘토링에 참여했던) 스크립트 목록 조회
      responses:
        '200':
          description: 스크립트 목록 반환
  /scripts/{mentoringId}:
    get:
      summary: 스크립트 전문 조회
      responses:
        '200':
          description: 스크립트 전문 반환
