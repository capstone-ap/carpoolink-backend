openapi: 3.1.0
info:
  title: Carpoolink Mentoring Platform API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /survey:
    get:
      summary: 사전 설문의 질문과 선택지 조회
      responses:
        '200':
          description: 설문 질문과 선택지 목록 반환
  /survey/results:
    post:
      summary: 사전 설문 결과 제출 및 유형 판정
      responses:
        '200':
          description: 사전 설문 결과 및 유형 저장 및 반환
  /users/exists:
    get:
      summary: 사용자 존재 여부 확인
      responses:
        '200':
          description: 사용자 존재 여부 반환
  /users/me:
    get:
      summary: 사용자 프로필 조회
      responses:
        '200':
          description: 사용자 프로필 정보 반환
  /mentors:
    get:
      summary: List mentors
      responses:
        '200':
          description: Mentor list
  /mentors/{mentorId}:
    get:
      summary: Get mentor detail
      responses:
        '200':
          description: Mentor detail
  /mentorings/group:
    get:
      summary: List group mentorings
      responses:
        '200':
          description: Group mentoring list
  /mentorings/one-on-one/peers:
    get:
      summary: List one-on-one peers
      responses:
        '200':
          description: One-on-one peer list
  /scripts:
    get:
      summary: List all scripts
      responses:
        '200':
          description: Script list
  /scripts/participated:
    get:
      summary: List scripts from mentorings the trusted user participated in
      responses:
        '200':
          description: Participated script list
